# IT 자산 등록 캠페인 v2 — v1과 동일 호스트에서 8082 포트로 동시 운영
services:
  asset-campaign-v2:
    build:
      context: .
      dockerfile: Dockerfile
    image: asset-campaign-v2:latest
    container_name: asset-campaign-v2
    ports:
      - '8082:8082'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8082/']
      interval: 30s
      timeout: 3s
      retries: 3
